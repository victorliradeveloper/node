services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bookstore-jpa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: banco123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: banco123
      DB_NAME: bookstore-jpa
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
